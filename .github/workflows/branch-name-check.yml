name: Branch Name Check

on:
  push:
    branches-ignore:
      - main

jobs:
  check-branch-name:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}

          if [[ ! "$BRANCH_NAME" =~ ^(feature\/.+|bugfix\/.+|ci\/.+|chore\/.+)$ ]]; then
            echo "Invalid branch name: $BRANCH_NAME"
            echo "Branch must start with feature/, bugfix/, ci/ or chore/ (followed by a name)"
            exit 1
          fi
